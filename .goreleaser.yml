---
version: 2

builds:
  - id: claudelint
    binary: claudelint
    main: ./cmd/claudelint
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.ShortCommit}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      # windows/arm64 rarely worth the extra matrix time for a CLI linter.
      - goos: windows
        goarch: arm64
    env:
      - CGO_ENABLED=0

archives:
  - id: default
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    formats: ["tar.gz"]
    format_overrides:
      - goos: windows
        formats: ["zip"]
    files:
      - none*

dockers:
  - id: claudelint-amd64
    goos: linux
    goarch: amd64
    dockerfile: Dockerfile
    use: buildx
    image_templates:
      - "ghcr.io/donaldgifford/claudelint:{{ .Version }}-amd64"
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
      - "--label=org.opencontainers.image.created={{ .Date }}"
  - id: claudelint-arm64
    goos: linux
    goarch: arm64
    dockerfile: Dockerfile
    use: buildx
    image_templates:
      - "ghcr.io/donaldgifford/claudelint:{{ .Version }}-arm64"
    build_flag_templates:
      - "--platform=linux/arm64"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
      - "--label=org.opencontainers.image.created={{ .Date }}"

docker_manifests:
  - name_template: "ghcr.io/donaldgifford/claudelint:{{ .Version }}"
    image_templates:
      - "ghcr.io/donaldgifford/claudelint:{{ .Version }}-amd64"
      - "ghcr.io/donaldgifford/claudelint:{{ .Version }}-arm64"
  - name_template: "ghcr.io/donaldgifford/claudelint:v{{ .Major }}"
    image_templates:
      - "ghcr.io/donaldgifford/claudelint:{{ .Version }}-amd64"
      - "ghcr.io/donaldgifford/claudelint:{{ .Version }}-arm64"
  - name_template: "ghcr.io/donaldgifford/claudelint:v{{ .Major }}.{{ .Minor }}"
    image_templates:
      - "ghcr.io/donaldgifford/claudelint:{{ .Version }}-amd64"
      - "ghcr.io/donaldgifford/claudelint:{{ .Version }}-arm64"
  - name_template: "ghcr.io/donaldgifford/claudelint:latest"
    image_templates:
      - "ghcr.io/donaldgifford/claudelint:{{ .Version }}-amd64"
      - "ghcr.io/donaldgifford/claudelint:{{ .Version }}-arm64"

checksum:
  name_template: 'checksums.txt'

signs:
  - artifacts: checksum
    args:
      - "--batch"
      - "--local-user"
      - "{{ .Env.GPG_FINGERPRINT }}"
      - "--output"
      - "${signature}"
      - "--detach-sign"
      - "${artifact}"

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - Merge pull request
      - Merge branch
  groups:
    - title: Features
      regexp: "^feat:"
      order: 0
    - title: Bug Fixes
      regexp: "^fix:"
      order: 1
    - title: Others
      order: 999

release:
  github:
    owner: donaldgifford
    name: claudelint
  draft: false
  prerelease: auto
  mode: prepend
  header: |
    ## Release {{ .Tag }} ({{ .Date }})

    ### Installation

    #### Linux/macOS (Manual)
    ```bash
    # Download the appropriate binary for your system
    # Extract and move to your PATH
    tar -xzf claudelint*.tar.gz
    mv claudelint ~/.local/bin/
    ```

  footer: |
    ---
    **Full Changelog**: https://github.com/donaldgifford/claudelint/compare/{{ .PreviousTag }}...{{ .Tag }}

snapshot:
  version_template: "{{ .Tag }}-dev"
